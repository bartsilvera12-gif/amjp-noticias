<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Noticias — Asociación de Magistrados Judiciales del Paraguay</title>
<link rel="icon" type="image/png" href="logo-amjp.png"/>
<link rel="shortcut icon" type="image/png" href="logo-amjp.png"/>
<link rel="apple-touch-icon" href="logo-amjp.png"/>
<meta name="description" content="Sitio oficial de la Asociación de Magistrados Judiciales del Paraguay. Noticias, resoluciones, capacitación, eventos y servicios para socios."/>
<meta property="og:title" content="AMJP — Asociación de Magistrados Judiciales del Paraguay"/>
<meta property="og:description" content="Gremio que nuclea a los Magistrados Judiciales del Paraguay, en defensa de la independencia judicial."/>
<meta property="og:image" content="logo-amjp.png"/>
<meta property="og:type" content="website"/>
<meta name="theme-color" content="#0c1a30"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Libre+Baskerville:wght@400;700&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy-950:#091322; --navy-900:#0c1a30; --navy-800:#10243f; --navy-700:#163056; --navy-600:#22406b;
  --gold:#b08a3c;
}
*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{ background:#dfded8; transition:background .4s cubic-bezier(.22,.61,.36,1); }
body:has(.amjp[data-dark="true"]){ background:#06101d; }

/* Smooth global transition al alternar tema (~500ms). Aplicado vía clase en <html>. */
html.theme-transitioning, html.theme-transitioning *, html.theme-transitioning *::before, html.theme-transitioning *::after{
  transition:background-color .4s cubic-bezier(.22,.61,.36,1),
             background .4s cubic-bezier(.22,.61,.36,1),
             border-color .4s cubic-bezier(.22,.61,.36,1),
             color .4s cubic-bezier(.22,.61,.36,1),
             fill .4s cubic-bezier(.22,.61,.36,1),
             stroke .4s cubic-bezier(.22,.61,.36,1),
             box-shadow .4s cubic-bezier(.22,.61,.36,1) !important;
}

.amjp{
  --accent:#b08a3c;
  --title-font:'Spectral', Georgia, serif;
  --body-font:'Public Sans', system-ui, sans-serif;
  --paper:#f5f3ee; --card:#ffffff; --ink:#1a212c; --ink-soft:#36404f; --muted:#646d7c;
  --line:#e6e3da; --line-strong:#d6d2c6;
  --row-pad:20px; --feat-gap:30px; --sec-gap:74px; --fs:16px; --title-scale:1;
  font-family:var(--body-font);
  color:var(--ink);
  background:var(--paper);
  font-size:var(--fs);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  overflow-x:clip;
  transition:background .35s ease, color .35s ease;
}
.amjp[data-density="compact"]{ --row-pad:14px; --feat-gap:22px; --sec-gap:52px; --fs:15px; }
.amjp[data-density="amplia"]{ --row-pad:28px; --feat-gap:42px; --sec-gap:104px; --fs:17px; --title-scale:1.08; }

.amjp[data-dark="true"]{
  --paper:#0a1322; --card:#0f1b30; --ink:#eef2f8; --ink-soft:#c3ccda; --muted:#93a0b3;
  --line:#1c2c46; --line-strong:#27395a;
}

.wrap{ max-width:1200px; margin:0 auto; padding:0 32px; }
a{ color:inherit; text-decoration:none; }
button{ font-family:inherit; cursor:pointer; }

/* ===== Top bar ===== */
.topbar{ background:var(--navy-950); color:#c7cedb; font-size:12.5px; letter-spacing:.02em; }
.amjp[data-dark="true"] .topbar{ background:#06101d; }
.topbar-in{ display:flex; align-items:center; justify-content:space-between; height:38px; }
.topbar-tag{ opacity:.82; }
.topbar-links{ display:flex; align-items:center; gap:10px; }
.topbar-links a{ opacity:.82; transition:color .2s, opacity .2s; }
.topbar-links a:hover{ opacity:1; color:var(--accent); }
.topbar-links .dot{ opacity:.4; }

/* Botón modo oscuro */
.theme-toggle{ margin-left:6px; position:relative; width:28px; height:28px; border-radius:50%;
  background:transparent; border:1px solid rgba(255,255,255,.18); color:#c7cedb;
  display:grid; place-items:center; cursor:pointer; padding:0; overflow:hidden;
  transition:border-color .25s, color .25s, transform .35s cubic-bezier(.22,.61,.36,1), background .25s; }
.theme-toggle:hover{ color:var(--accent); border-color:var(--accent); background:rgba(176,138,60,.12); }
.theme-toggle .tt-icon{ position:absolute; inset:0; display:grid; place-items:center;
  transition:transform .55s cubic-bezier(.22,.61,.36,1), opacity .35s; }
.theme-toggle .tt-icon svg{ width:15px; height:15px; }
.theme-toggle .tt-sun{ transform:rotate(0deg) scale(1); opacity:1; }
.theme-toggle .tt-moon{ transform:rotate(-90deg) scale(.5); opacity:0; }
.theme-toggle.is-dark .tt-sun{ transform:rotate(90deg) scale(.5); opacity:0; }
.theme-toggle.is-dark .tt-moon{ transform:rotate(0deg) scale(1); opacity:1; }

/* ===== Header / nav (azul institucional del logo, estilo Servín: blur + scroll-shrink + subrayado animado) ===== */
.nav{ position:sticky; top:0; z-index:40;
  background:color-mix(in srgb, var(--navy-900) 88%, transparent);
  backdrop-filter:saturate(140%) blur(14px); -webkit-backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid rgba(255,255,255,.07);
  transition:box-shadow .4s cubic-bezier(.22,.61,.36,1), border-color .4s, background .4s; }
.nav.is-scrolled{
  background:color-mix(in srgb, var(--navy-900) 96%, transparent);
  border-bottom-color:rgba(255,255,255,.1);
  box-shadow:0 1px 0 color-mix(in srgb, var(--accent) 36%, transparent), 0 8px 26px rgba(0,0,0,.32);
}
.amjp[data-dark="true"] .nav{ background:color-mix(in srgb, #04101e 90%, transparent); border-bottom-color:rgba(255,255,255,.08); }
.amjp[data-dark="true"] .nav.is-scrolled{ background:color-mix(in srgb, #04101e 98%, transparent); }
.nav-in{ display:flex; align-items:center; justify-content:space-between; height:92px; gap:24px;
  transition:height .4s cubic-bezier(.22,.61,.36,1); }
.nav.is-scrolled .nav-in{ height:72px; }

.brand{ display:flex; align-items:center; gap:14px; flex-shrink:0; }
.brand-emblem{ width:56px; height:56px; display:grid; place-items:center; flex-shrink:0;
  filter:drop-shadow(0 1px 2px rgba(12,26,48,.25));
  transition:width .35s cubic-bezier(.22,.61,.36,1), height .35s cubic-bezier(.22,.61,.36,1); }
.nav.is-scrolled .brand-emblem{ width:44px; height:44px; }
.brand-emblem img{ width:100%; height:100%; object-fit:contain; display:block; }
.brand-text{ display:flex; flex-direction:column; gap:1px; }
.brand-mark{ font-family:var(--title-font); font-weight:700; font-size:21px; letter-spacing:.06em; color:#fff; line-height:1;
  transition:font-size .35s cubic-bezier(.22,.61,.36,1); }
.nav.is-scrolled .brand-mark{ font-size:18px; }
.amjp[data-theme="institucional"] .brand-mark{ color:#fff; }
.amjp[data-theme="institucional"] .brand-name{ color:#aeb9cb; }
.brand-name{ font-size:10.5px; letter-spacing:.04em; color:#aeb9cb; line-height:1.3; text-transform:uppercase; font-weight:500;
  transition:opacity .3s, max-height .35s; max-height:40px; overflow:hidden; }
.nav.is-scrolled .brand-name{ opacity:0; max-height:0; }
.brand--sm .brand-name{ color:#aeb9cb; }

.nav-menu{ display:flex; align-items:center; gap:6px; margin-left:auto; }
.nav-item{ position:relative; }
.nav-item > a{ position:relative; display:flex; align-items:center; gap:5px;
  padding:8px 4px; font-size:15px; font-weight:500;
  color:#c4cdda; transition:color .25s; white-space:nowrap; margin:0 9px; }
.nav-item + .nav-item{ }
.amjp[data-theme="institucional"] .nav-item > a{ color:#c4cdda; }
.nav-item > a::after{ content:""; position:absolute; left:0; right:auto; bottom:-4px;
  height:1.5px; width:0; background:var(--accent);
  transition:width .3s cubic-bezier(.22,.61,.36,1); }
.nav-item > a:hover{ color:#fff; }
.amjp[data-theme="institucional"] .nav-item > a:hover{ color:#fff; }
.nav-item > a:hover::after{ width:100%; }
.nav-caret{ width:14px; height:14px; opacity:.6; }
.nav-item.is-active > a{ color:#fff; font-weight:600; }
.amjp[data-theme="institucional"] .nav-item.is-active > a{ color:#fff; }
.nav-item.is-active > a::after{ width:100%; }

.nav-drop{ position:absolute; top:calc(100% + 8px); left:0; min-width:230px; background:var(--card);
  border:1px solid var(--line); border-radius:10px; padding:7px;
  box-shadow:0 18px 44px -18px rgba(12,26,48,.34), 0 2px 8px rgba(12,26,48,.06);
  opacity:0; visibility:hidden; transform:translateY(6px); transition:all .2s ease; }
.amjp[data-dark="true"] .nav-drop{ box-shadow:0 18px 44px -16px rgba(0,0,0,.6); }
.nav-item.has-drop:hover .nav-drop{ opacity:1; visibility:visible; transform:translateY(0); }
.nav-drop a{ display:block; padding:9px 12px; font-size:14px; color:var(--ink-soft); border-radius:7px; transition:background .15s, color .15s; }
.nav-drop a:hover{ background:color-mix(in srgb, var(--accent) 12%, transparent); color:var(--ink); }
.nav-drop::before{ content:""; position:absolute; top:-5px; left:24px; width:10px; height:10px; background:var(--card);
  border-left:1px solid var(--line); border-top:1px solid var(--line); transform:rotate(45deg); }

.nav-burger{ display:none; background:none; border:none; color:#fff; padding:8px; }
.amjp[data-theme="institucional"] .nav-burger{ color:#fff; }
.nav-burger svg{ width:26px; height:26px; }
.nav-mobile{ display:none; }

/* ===== Page head ===== */
.page-head{ padding:36px 0 20px; background:
  radial-gradient(120% 140% at 100% 0%, color-mix(in srgb, var(--accent) 7%, transparent), transparent 55%); }
.amjp[data-theme="institucional"] .page-head{ background:var(--navy-900); color:#fff; padding:44px 0 24px; }
.amjp[data-theme="moderno"] .page-head{ padding:46px 0 22px; }
.crumb{ display:flex; align-items:center; gap:9px; font-size:13px; color:var(--muted); margin-bottom:14px; letter-spacing:.02em; }
.amjp[data-theme="institucional"] .crumb{ color:#9fabbe; }
.crumb a:hover{ color:var(--accent); }
.crumb span:nth-child(2){ opacity:.5; }
.page-title{ font-family:var(--title-font); font-weight:700; font-size:clamp(38px, 5.4vw, 56px);
  line-height:1.02; margin:0; letter-spacing:-.012em; }
.amjp[data-theme="moderno"] .page-title{ font-size:clamp(42px,6vw,64px); font-weight:600; }
.page-sub{ margin:12px 0 0; font-size:15.5px; color:var(--muted); max-width:560px; }
.amjp[data-theme="institucional"] .page-sub{ color:#aeb9cb; }
.page-sub .ph-count{ color:var(--accent); font-weight:500; }

/* ===== Section heads ===== */
.sec-head{ display:flex; align-items:center; gap:20px; margin-bottom:26px; }
.sec-head--list{ margin-top:8px; margin-bottom:18px; }
.sec-title{ font-family:var(--title-font); font-weight:600; font-size:14px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--accent); margin:0; white-space:nowrap; }
.sec-rule{ height:1px; flex:1; background:var(--line-strong); }

/* ===== Portada (estilo Agenda Legal + carrusel auto) ===== */
.portada{ padding:4px 0 0; }
.portada-stage{ position:relative; min-height:clamp(380px, 44vw, 500px);
  background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden;
  box-shadow:0 24px 56px -32px rgba(12,26,48,.34);
  transition:box-shadow .35s, border-color .35s; }
.portada-stage:hover{ border-color:color-mix(in srgb, var(--accent) 30%, var(--line));
  box-shadow:0 36px 70px -32px rgba(12,26,48,.42); }
.portada-card{ position:absolute; inset:0; display:grid; grid-template-columns:1.15fr 1fr;
  cursor:pointer; opacity:0; pointer-events:none; visibility:hidden;
  transition:opacity .6s cubic-bezier(.22,.61,.36,1), visibility 0s linear .6s; }
.portada-card.is-on{ opacity:1; pointer-events:auto; visibility:visible; z-index:1;
  transition:opacity .6s cubic-bezier(.22,.61,.36,1), visibility 0s; }
.portada-photo{ position:relative; overflow:hidden; background:var(--ink); }
.portada-photo .ph{ width:100%; height:100%; aspect-ratio:auto !important; transition:transform .8s cubic-bezier(.22,.61,.36,1); }
.portada-card.is-on:hover .portada-photo .ph{ transform:scale(1.02); }
/* Fondo borroso de la propia imagen para que "contain" no deje bandas vacías */
.ph--contain{ position:relative; background:var(--navy-900); }
.ph--contain .ph-blur{ position:absolute; inset:-12%; z-index:0;
  background-image:var(--ph-bg); background-size:cover; background-position:center;
  filter:blur(34px) saturate(130%) brightness(.5); transform:scale(1.2); pointer-events:none; }
/* Velo oscuro para que las bandas laterales queden como un panel uniforme,
   incluso cuando la imagen es clara (portadas de revistas, documentos, etc.) */
.ph--contain .ph-blur::after{ content:""; position:absolute; inset:0; background:rgba(9,20,38,.5); }
.ph--contain > img{ position:relative; z-index:1; }
.portada-text{ display:flex; flex-direction:column; justify-content:center; padding:clamp(28px,3.6vw,52px); gap:16px; }
.portada-kicker{ display:inline-flex; align-items:center; gap:10px; font-family:var(--body-font);
  font-size:11.5px; letter-spacing:.3em; text-transform:uppercase; color:var(--accent); font-weight:600; }
.portada-kicker::before{ content:""; width:26px; height:1px; background:var(--accent); }
.portada-title{ font-family:var(--title-font); font-weight:700; font-size:clamp(26px,2.9vw,40px);
  line-height:1.13; letter-spacing:-.012em; margin:0; color:var(--ink); text-wrap:balance;
  transition:color .25s; }
.amjp[data-theme="moderno"] .portada-title{ font-weight:600; }
.portada-card.is-on:hover .portada-title{ color:var(--accent); }
.portada-sum{ margin:0; font-size:15.5px; line-height:1.6; color:var(--ink-soft); text-wrap:pretty;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.portada-meta{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding-top:6px; border-top:1px solid var(--line); }
.portada-meta .chip{ }
.portada-date{ font-size:13px; color:var(--muted); letter-spacing:.02em; display:inline-flex; align-items:center; gap:8px; }
.portada-date::before{ content:""; width:4px; height:4px; border-radius:50%; background:var(--accent); }
.portada-cta{ display:inline-flex; align-items:center; gap:8px; margin-top:4px;
  font-size:14px; font-weight:600; color:var(--accent); letter-spacing:.01em; transition:gap .25s; align-self:flex-start; }
.portada-card.is-on:hover .portada-cta{ gap:14px; }
.portada-cta svg{ width:16px; height:16px; }

/* Controles del carrusel */
.port-nav{ position:absolute; top:50%; transform:translateY(-50%); z-index:5;
  width:44px; height:44px; border-radius:50%; border:1px solid var(--line);
  background:color-mix(in srgb, var(--card) 88%, transparent); backdrop-filter:blur(8px);
  color:var(--ink); display:grid; place-items:center; cursor:pointer; padding:0;
  box-shadow:0 8px 24px -10px rgba(12,26,48,.25);
  transition:background .2s, transform .25s cubic-bezier(.22,.61,.36,1), color .2s, opacity .25s;
  opacity:0; }
.portada-stage:hover .port-nav{ opacity:1; }
.port-nav svg{ width:18px; height:18px; }
.port-nav:hover{ background:var(--accent); color:#fff; border-color:var(--accent); transform:translateY(-50%) scale(1.05); }
.port-prev{ left:14px; }
.port-prev svg{ transform:rotate(180deg); }
.port-next{ right:14px; }

/* Puntos indicadores */
.port-dots{ position:absolute; bottom:18px; left:50%; transform:translateX(-50%); z-index:5;
  display:flex; gap:8px; align-items:center; padding:6px 12px; border-radius:999px;
  background:color-mix(in srgb, var(--card) 78%, transparent); backdrop-filter:blur(8px);
  border:1px solid var(--line); }
.port-dot{ width:8px; height:8px; border-radius:50%; background:color-mix(in srgb, var(--ink) 22%, transparent);
  border:0; padding:0; cursor:pointer; transition:background .25s, transform .25s, width .25s; }
.port-dot:hover{ background:color-mix(in srgb, var(--ink) 42%, transparent); }
.port-dot.is-on{ background:var(--accent); width:24px; border-radius:4px; }

/* Barra de progreso (auto-advance) */
.port-progress{ position:absolute; left:0; bottom:0; height:3px; background:var(--accent); z-index:4;
  width:0%; animation:portFill linear forwards; transform-origin:left center;
  box-shadow:0 0 12px color-mix(in srgb, var(--accent) 50%, transparent); }
@keyframes portFill { from{ width:0%; } to{ width:100%; } }

@media (max-width:820px){
  .portada-stage{ min-height:0; }
  .portada-card{ grid-template-columns:1fr; position:relative; }
  .portada-card:not(.is-on){ display:none; }
  .portada-photo{ aspect-ratio:16/10; }
  .portada-text{ padding:26px 24px 32px; gap:14px; }
  .port-nav{ width:38px; height:38px; opacity:1; }
  .port-prev{ left:10px; }
  .port-next{ right:10px; }
  .port-dots{ bottom:14px; }
}
@media (max-width:480px){
  .portada-stage{ border-radius:10px; }
  .portada-title{ font-size:22px; }
}

/* ===== Featured ===== */
.featured{ padding:var(--sec-gap) 0 0; }
.featured-grid{ display:grid; grid-template-columns:1.55fr 1fr; gap:var(--feat-gap); }
.feat{ cursor:pointer; }
.feat-img{ border-radius:8px; overflow:hidden; }
.amjp[data-theme="moderno"] .feat-img{ border-radius:14px; }
/* Foto de baja resolución detectada: se achica en vez de estirarse borrosa */
.feat--main-lowres .feat-img{ max-width:420px; }
.feat-body{ display:flex; flex-direction:column; align-items:flex-start; }
.feat--main .feat-body{ padding-top:22px; }
.feat-meta{ display:flex; align-items:center; gap:14px; margin-bottom:13px; flex-wrap:wrap; }
.meta-date{ font-size:12.5px; color:var(--muted); letter-spacing:.02em; display:inline-flex; align-items:center; gap:6px; }
.md-ic{ width:14px; height:14px; opacity:.7; }
.feat--main .feat-title{ font-family:var(--title-font); font-weight:600; font-size:clamp(26px,2.7vw,36px);
  line-height:1.15; margin:0; letter-spacing:-.01em; transition:color .25s; text-wrap:pretty; }
.feat--main:hover .feat-title{ color:var(--accent); }
.readlink{ display:inline-flex; align-items:center; gap:8px; margin-top:18px; font-size:14px; font-weight:600;
  color:var(--accent); letter-spacing:.01em; }
.rl-arrow{ width:18px; height:18px; transition:transform .25s; }
.feat--main:hover .rl-arrow{ transform:translateX(5px); }

.feat-side{ display:flex; flex-direction:column; gap:var(--feat-gap); }
.feat--mini{ display:grid; grid-template-columns:118px 1fr; gap:16px; align-items:start; }
.amjp[data-density="amplia"] .feat--mini{ grid-template-columns:134px 1fr; }
.feat--mini .feat-img{ margin:0; }
.feat--mini .feat-meta{ margin-bottom:8px; gap:9px; }
.feat--mini .feat-title{ font-family:var(--title-font); font-weight:600; font-size:18px; line-height:1.28; margin:0;
  transition:color .25s; text-wrap:pretty; }
.feat--mini:hover .feat-title{ color:var(--accent); }
.feat--main, .feat--mini{ transition:transform .3s ease; }
.amjp[data-theme="moderno"] .feat--main:hover, .amjp[data-theme="moderno"] .feat--mini:hover{ transform:translateY(-3px); }

/* Institucional: tarjetas con marco */
.amjp[data-theme="institucional"] .feat--main{ background:var(--card); border:1px solid var(--line); border-radius:10px; overflow:hidden;
  box-shadow:0 1px 2px rgba(12,26,48,.04); transition:box-shadow .3s, transform .3s; }
.amjp[data-theme="institucional"] .feat--main:hover{ box-shadow:0 24px 50px -26px rgba(12,26,48,.32); transform:translateY(-2px); }
.amjp[data-theme="institucional"] .feat--main .feat-img{ border-radius:0; }
.amjp[data-theme="institucional"] .feat--main .feat-body{ padding:24px 26px 28px; border-top:3px solid var(--accent); }

/* ===== Placeholder de imagen ===== */
.ph{ position:relative; width:100%; background:var(--navy-900); overflow:hidden;
  display:grid; place-items:center; isolation:isolate; }
.amjp[data-dark="true"] .ph{ background:#0b1626; }
.ph-stripes{ position:absolute; inset:0; opacity:.5;
  background:repeating-linear-gradient(135deg, rgba(255,255,255,.045) 0 2px, transparent 2px 11px); }
.ph-grad{ position:absolute; inset:0; }
.ph-tag{ position:relative; z-index:1; font-family:'Public Sans', monospace; font-size:10.5px; letter-spacing:.22em;
  text-transform:uppercase; color:rgba(255,255,255,.62); font-weight:600;
  border:1px solid rgba(255,255,255,.22); padding:6px 12px; border-radius:3px; backdrop-filter:blur(1px); }

/* ===== Filter bar ===== */
.filterbar-sentinel{ height:1px; margin-bottom:-1px; pointer-events:none; }
.filterbar{ position:sticky; top:72px; z-index:30; background:color-mix(in srgb, var(--paper) 88%, transparent);
  backdrop-filter:blur(10px); border-bottom:1px solid var(--line); margin-top:var(--sec-gap);
  transition:box-shadow .35s cubic-bezier(.22,.61,.36,1), background .35s, transform .35s cubic-bezier(.22,.61,.36,1); }
.filterbar.is-compact{ box-shadow:0 6px 18px -10px rgba(12,26,48,.18); background:color-mix(in srgb, var(--paper) 94%, transparent); }
/* Se desliza detrás del encabezado al desplazarse hacia abajo */
.filterbar.is-hidden{ transform:translateY(-110%); box-shadow:none; pointer-events:none; }
.amjp[data-theme="institucional"] .filterbar{ top:78px; }
.filterbar-in{ padding:18px 32px; transition:padding .35s cubic-bezier(.22,.61,.36,1); }
.filterbar.is-compact .filterbar-in{ padding:9px 32px; }
.fb-row{ display:flex; gap:14px; align-items:center; }

/* Buscador inline tipo píldora — sobrio, filtra en vivo */
.search{ position:relative; flex:1; display:flex; align-items:center; gap:10px;
  padding:11px 18px; min-height:44px;
  background:var(--paper); border:1px solid var(--line); border-radius:999px;
  transition:border-color .25s, background .25s, padding .35s, min-height .35s; }
.search:focus-within{ border-color:var(--line-strong); background:var(--card); }
.search-ic{ position:static; transform:none; width:17px; height:17px; color:var(--muted); flex-shrink:0; }
.search input{ flex:1; width:100%; border:0; outline:0; background:transparent; color:var(--ink);
  font-family:inherit; font-size:15px; padding:0;
  transition:font-size .3s; }
.search input::placeholder{ color:var(--muted); font-style:italic; opacity:.85; }
.search-x{ position:static; transform:none; width:22px; height:22px; padding:0; border:0; background:none;
  color:var(--muted); border-radius:50%; display:grid; place-items:center; cursor:pointer; flex-shrink:0;
  transition:color .2s, background .2s; }
.search-x svg{ width:13px; height:13px; }
.search-x:hover{ color:var(--ink); background:var(--line); }

.filterbar.is-compact .search{ padding:6px 14px; min-height:36px; }
.filterbar.is-compact .search input{ font-size:14px; }
.filterbar.is-compact .search-ic{ width:15px; height:15px; }

/* Overlay full-screen con shape-morph (Codrops/Wilson style) */
.sov{ position:fixed; inset:0; z-index:80; visibility:hidden; pointer-events:none; }
.sov.is-open{ visibility:visible; pointer-events:auto; }
.sov-shapes{ position:absolute; inset:0; width:100%; height:100%; display:block; pointer-events:none; }
.sov-shapes path:nth-child(1){ fill:#163056; } /* navy-700 */
.sov-shapes path:nth-child(2){ fill:#0c1a30; } /* navy-900 */
.sov-shapes path:nth-child(3){ fill:#091322; } /* navy-950 */
.sov-close{ position:absolute; top:24px; right:24px; width:46px; height:46px; border-radius:50%;
  background:transparent; border:1px solid rgba(255,255,255,.18); color:rgba(255,255,255,.75);
  display:grid; place-items:center; cursor:pointer; opacity:0; transform:scale(.85); z-index:2;
  transition:opacity .35s cubic-bezier(.22,.61,.36,1), transform .35s cubic-bezier(.22,.61,.36,1), color .25s, border-color .25s; }
.sov.content-ready .sov-close{ opacity:1; transform:scale(1); }
.sov-close svg{ width:20px; height:20px; }
.sov-close:hover{ color:var(--accent); border-color:var(--accent); transform:scale(1) rotate(90deg); }
.sov-inner{ position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:stretch;
  max-width:720px; margin:0 auto; padding:40px clamp(24px, 5vw, 60px); text-align:center; z-index:2;
  opacity:0; transform:translateY(24px); pointer-events:none;
  transition:opacity .45s cubic-bezier(.22,.61,.36,1), transform .55s cubic-bezier(.22,.61,.36,1); }
.sov.content-ready .sov-inner{ opacity:1; transform:translateY(0); pointer-events:auto; }
.sov-hint{ font-family:var(--body-font); font-size:12px; letter-spacing:.32em; text-transform:uppercase;
  color:var(--accent); margin:0 0 18px; font-weight:600; }
.sov-title{ font-family:var(--title-font); font-weight:600; font-size:clamp(28px, 4vw, 48px); color:#fff;
  margin:0 0 36px; line-height:1.1; letter-spacing:-.015em; text-wrap:balance; }
.sov-field{ display:flex; align-items:baseline; gap:16px; padding:12px 4px;
  border-bottom:1.5px solid color-mix(in srgb, var(--accent) 45%, transparent); transition:border-color .3s cubic-bezier(.22,.61,.36,1); }
.sov-field:focus-within{ border-color:var(--accent); }
.sov-field.no-results{ border-color:rgba(255,120,120,.7); animation:sovShake .35s cubic-bezier(.22,.61,.36,1); }
@keyframes sovShake { 0%,100%{ transform:translateX(0); } 25%{ transform:translateX(-7px); } 75%{ transform:translateX(7px); } }
.sov-field > span{ font-family:var(--body-font); font-size:13px; font-weight:600; color:var(--accent);
  letter-spacing:.22em; text-transform:uppercase; flex-shrink:0; }
.sov-field input{ flex:1; width:100%; min-width:0; background:transparent; border:0; outline:0; color:#fff;
  font-family:var(--title-font); font-size:clamp(22px, 2.4vw, 32px); font-weight:500; padding:0; }
.sov-field input::placeholder{ color:rgba(255,255,255,.35); font-style:italic; }
.sov-clear{ width:32px; height:32px; border-radius:50%; background:transparent; border:1px solid rgba(255,255,255,.18);
  color:rgba(255,255,255,.7); display:grid; place-items:center; cursor:pointer; flex-shrink:0; padding:0;
  transition:color .25s, border-color .25s, transform .25s; }
.sov-clear svg{ width:14px; height:14px; }
.sov-clear:hover{ color:var(--accent); border-color:var(--accent); transform:rotate(90deg); }
.sov-meta{ margin-top:26px; font-size:14px; color:rgba(255,255,255,.7); font-family:var(--body-font); letter-spacing:.02em; }
.sov-meta strong{ color:#fff; font-weight:600; }
.sov-meta kbd{ font-family:'Public Sans', monospace; font-size:11px; font-weight:600;
  padding:2px 7px; border:1px solid rgba(255,255,255,.2); border-bottom-width:2px; border-radius:5px;
  color:#fff; background:rgba(255,255,255,.04); margin:0 2px; }
@media (max-width:600px){
  .sov-inner{ padding:32px 20px; }
  .sov-title{ margin-bottom:26px; }
  .sov-field > span{ font-size:11.5px; }
  .sov-close{ top:16px; right:16px; width:42px; height:42px; }
}

/* Selector de año estilo píldora para combinar */
.yr{ position:relative; flex-shrink:0; }
.yr select{ appearance:none; height:48px; border:1px solid var(--line); background:var(--paper); color:var(--ink);
  border-radius:999px; padding:0 42px 0 20px; font-size:14.5px; font-family:inherit; font-weight:500;
  cursor:pointer; min-width:170px;
  transition:border-color .3s cubic-bezier(.22,.61,.36,1), background .3s, box-shadow .3s, height .35s, font-size .3s, padding .3s, min-width .35s; }
.filterbar.is-compact .yr select{ height:38px; font-size:13px; padding:0 36px 0 16px; min-width:140px; }
.filterbar.is-compact .yr-caret{ width:14px; height:14px; right:14px; }
.yr select:hover{ border-color:color-mix(in srgb, var(--accent) 40%, var(--line)); }
.yr select:focus{ outline:none; border-color:var(--accent); background:var(--card);
  box-shadow:0 0 0 4px color-mix(in srgb, var(--accent) 14%, transparent); }
.yr-caret{ position:absolute; right:16px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--muted); pointer-events:none;
  transition:color .25s, transform .3s; }
.yr:focus-within .yr-caret{ color:var(--accent); transform:translateY(-50%) rotate(180deg); }

.cat-chips{ display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; transition:margin-top .35s cubic-bezier(.22,.61,.36,1), gap .3s; }
.filterbar.is-compact .cat-chips{ margin-top:8px; gap:6px; }
.cc{ display:inline-flex; align-items:center; gap:7px; padding:7px 14px; border-radius:20px; border:1px solid var(--line-strong);
  background:transparent; color:var(--ink-soft); font-size:13px; font-weight:500;
  transition:all .18s, padding .35s cubic-bezier(.22,.61,.36,1), font-size .3s; }
.filterbar.is-compact .cc{ padding:4px 11px; font-size:12px; gap:5px; }
.filterbar.is-compact .cc-dot{ width:6px; height:6px; }
.cc-dot{ width:7px; height:7px; border-radius:50%; }
.cc:hover{ border-color:var(--accent); color:var(--ink); }
.cc.is-on{ background:var(--navy-900); color:#fff; border-color:var(--navy-900); }
.amjp[data-dark="true"] .cc.is-on{ background:var(--accent); border-color:var(--accent); color:#15110a; }
.cc.is-on .cc-dot{ box-shadow:0 0 0 2px rgba(255,255,255,.25); }
.fb-count{ margin-top:14px; font-size:13px; color:var(--muted); letter-spacing:.02em; }

/* ===== Main / list ===== */
.main{ padding:40px 32px 90px; }
.news-list{ border-top:1px solid var(--line); }
.amjp[data-theme="institucional"] .news-list{ border-top:none; display:flex; flex-direction:column; gap:10px; }

.year-div{ display:flex; align-items:center; gap:20px; padding:34px 0 14px; }
.year-div:first-child{ padding-top:18px; }
.yd-num{ font-family:var(--title-font); font-weight:600; font-size:24px; color:var(--accent); letter-spacing:.02em; }
.yd-line{ flex:1; height:1px; background:var(--line); }

.row{ display:grid; grid-template-columns:96px 1fr 26px; gap:24px; align-items:center; padding:var(--row-pad) 14px;
  border-bottom:1px solid var(--line); cursor:pointer; position:relative; transition:background .22s; }
.row::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent);
  transform:scaleY(0); transform-origin:center; transition:transform .25s ease; }
.row:hover{ background:color-mix(in srgb, var(--accent) 6%, transparent); }
.row:hover::before{ transform:scaleY(1); }
.amjp[data-theme="institucional"] .row{ background:var(--card); border:1px solid var(--line); border-radius:9px;
  border-bottom:1px solid var(--line); }
.amjp[data-theme="institucional"] .row:hover{ box-shadow:0 14px 30px -20px rgba(12,26,48,.3); }

.row-date{ display:flex; flex-direction:column; align-items:flex-start; line-height:1; }
.rd-day{ font-family:var(--title-font); font-weight:600; font-size:30px; color:var(--ink); letter-spacing:-.01em; }
.rd-my{ font-size:11px; font-weight:600; letter-spacing:.1em; color:var(--muted); margin-top:5px; }
.row-main{ display:flex; flex-direction:column; gap:9px; min-width:0; }
.row-title{ font-family:var(--title-font); font-weight:500; font-size:clamp(18px,1.5vw,21px); line-height:1.32; margin:0;
  color:var(--ink); transition:color .2s; text-wrap:pretty; }
.amjp[data-theme="moderno"] .row-title{ font-weight:600; }
.row:hover .row-title{ color:var(--accent); }
.row-arrow{ color:var(--line-strong); display:grid; place-items:center; transition:color .25s, transform .25s; }
.row-arrow svg{ width:20px; height:20px; }
.row:hover .row-arrow{ color:var(--accent); transform:translateX(4px); }

/* Chip */
.chip{ display:inline-flex; align-items:center; gap:7px; font-size:11.5px; font-weight:600; letter-spacing:.09em;
  text-transform:uppercase; color:var(--ink-soft); }
.chip--sm{ font-size:10.5px; letter-spacing:.08em; }
.chip-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.chip--sm .chip-dot{ width:7px; height:7px; }

/* Load more */
.loadmore-wrap{ display:flex; justify-content:center; margin-top:44px; }
.loadmore{ display:inline-flex; flex-direction:column; align-items:center; gap:4px; padding:16px 40px;
  background:var(--navy-900); color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:600;
  letter-spacing:.01em; transition:transform .2s, box-shadow .25s, background .2s; }
.loadmore:hover{ transform:translateY(-2px); box-shadow:0 16px 34px -16px rgba(12,26,48,.46); background:var(--navy-800); }
.amjp[data-dark="true"] .loadmore{ background:var(--accent); color:#14100a; }
.lm-count{ font-size:11.5px; font-weight:500; opacity:.62; letter-spacing:.04em; }
/* Indicador de carga automática (scroll infinito) */
.loadmore-auto{ display:inline-flex; flex-direction:column; align-items:center; gap:6px; padding:12px 20px;
  font-size:13.5px; font-weight:600; color:var(--muted); letter-spacing:.02em; }
.lm-dot{ width:10px; height:10px; border-radius:50%; background:var(--accent);
  animation:lm-pulse 1s ease-in-out infinite; }
@keyframes lm-pulse{ 0%,100%{ opacity:.35; transform:scale(.85); } 50%{ opacity:1; transform:scale(1); } }

/* Empty */
.empty{ text-align:center; padding:70px 20px; }
.empty-mark{ width:60px; height:60px; margin:0 auto 20px; border-radius:50%; background:var(--card); border:1px solid var(--line);
  display:grid; place-items:center; color:var(--muted); }
.empty-mark svg{ width:26px; height:26px; }
.empty p{ font-family:var(--title-font); font-size:21px; color:var(--ink-soft); margin:0 0 22px; }
.empty-reset{ padding:11px 24px; border:1px solid var(--accent); background:transparent; color:var(--accent);
  border-radius:8px; font-weight:600; font-size:14px; transition:background .2s; }
.empty-reset:hover{ background:color-mix(in srgb, var(--accent) 12%, transparent); }

/* ===== Modal ===== */
.modal-backdrop{ position:fixed; inset:0; z-index:90; background:rgba(8,16,28,.62); backdrop-filter:blur(6px);
  display:flex; align-items:flex-start; justify-content:center; padding:32px 20px; overflow-y:auto;
  animation:fade .25s ease; }
@keyframes fade{ from{ opacity:0; } to{ opacity:1; } }
.modal{ position:relative; width:100%; max-width:980px; background:var(--card); border-radius:14px; overflow:hidden;
  box-shadow:0 40px 100px -30px rgba(0,0,0,.6); animation:rise .32s cubic-bezier(.2,.7,.2,1); display:flex; flex-direction:column;
  max-height:calc(100vh - 64px); }
@keyframes rise{ from{ opacity:0; transform:translateY(22px); } to{ opacity:1; transform:translateY(0); } }
.modal-x{ position:absolute; top:16px; right:16px; z-index:3; width:40px; height:40px; border-radius:50%;
  background:rgba(255,255,255,.9); border:1px solid var(--line); color:var(--navy-900); display:grid; place-items:center;
  transition:transform .2s, background .2s; }
.amjp[data-dark="true"] .modal-x{ background:rgba(15,27,48,.9); color:#fff; }
.modal-x:hover{ transform:rotate(90deg); }
.modal-x svg{ width:18px; height:18px; }
.modal-scroll{ overflow-y:auto; }
.article{ padding:50px 60px 40px; }
.art-meta{ display:flex; align-items:center; gap:16px; margin-bottom:18px; flex-wrap:wrap; }
.art-title{ font-family:var(--title-font); font-weight:700; font-size:clamp(28px,3.8vw,44px); line-height:1.13;
  margin:0 0 14px; letter-spacing:-.012em; text-wrap:balance; }
.art-byline{ font-size:13px; color:var(--muted); padding-bottom:24px; border-bottom:1px solid var(--line); margin-bottom:26px; letter-spacing:.02em; }
.art-img{ border-radius:10px; overflow:hidden; margin-bottom:26px; }
/* Foto de baja resolución detectada: se achica y centra en vez de estirarse borrosa */
.art-img--lowres{ max-width:480px; margin-left:auto; margin-right:auto; }
.art-note{ font-size:14.5px; color:var(--ink-soft); background:color-mix(in srgb, var(--accent) 8%, transparent);
  border-left:3px solid var(--accent); padding:14px 18px; border-radius:0 8px 8px 0; margin-bottom:28px; }
.an-kicker{ display:block; font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin-bottom:5px; }
.art-skeleton{ display:flex; flex-direction:column; gap:13px; }
.art-skeleton span{ height:12px; border-radius:4px; background:var(--line); }
.art-skeleton .sk-short{ width:62%; }
.art-body{ font-size:16.5px; line-height:1.72; color:var(--ink-soft); }
.art-body p{ margin:0 0 1.1em; text-wrap:pretty; }
.art-body p:first-of-type{ font-size:18px; color:var(--ink); line-height:1.6; }
.art-body p:first-of-type::first-letter{ font-family:var(--title-font); font-weight:700; font-size:3.2em;
  float:left; line-height:.95; padding:4px 10px 0 0; color:var(--accent); }
/* ===== Convenios (renderer especial) ===== */
.conv{ display:flex; flex-direction:column; gap:42px; }
.conv-sec .sec-head{ margin-bottom:22px; }
.conv-count{ font-size:12px; font-weight:600; color:var(--muted); background:var(--paper);
  border:1px solid var(--line); border-radius:999px; padding:3px 11px; letter-spacing:.04em; }
.conv-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:18px; }
.conv-card{ display:flex; flex-direction:column; gap:14px; padding:18px 20px 20px;
  background:var(--card); border:1px solid var(--line); border-radius:12px;
  transition:transform .25s cubic-bezier(.22,.61,.36,1), box-shadow .25s, border-color .25s; }
.conv-card:hover{ transform:translateY(-2px); border-color:color-mix(in srgb, var(--accent) 30%, var(--line));
  box-shadow:0 18px 36px -22px rgba(12,26,48,.28); }
.conv-card-h{ display:flex; align-items:center; gap:14px; padding-bottom:13px; border-bottom:1px solid var(--line); }
.conv-logo{ flex-shrink:0; width:44px; height:44px; border-radius:8px; display:grid; place-items:center;
  background:var(--paper); border:1px solid var(--line); overflow:hidden; }
.conv-logo img{ width:26px; height:26px; object-fit:contain; display:block; }
.conv-logo-fall{ font-family:var(--title-font); font-weight:700; font-size:20px; color:var(--accent); }
.conv-name{ margin:0; font-family:var(--title-font); font-weight:600; font-size:16px; line-height:1.3;

.conv-fields{ margin:0; display:grid; grid-template-columns:auto 1fr; gap:6px 12px; align-items:start; }
.conv-lbl{ font-size:11.5px; font-weight:600; letter-spacing:.06em; text-transform:uppercase;

@media (max-width:520px){

}

.art-source{ margin-top:32px; padding-top:20px; border-top:1px solid var(--line); }
.art-source a{ display:inline-flex; align-items:center; gap:8px; font-size:13.5px; font-weight:600;
  color:var(--accent); letter-spacing:.01em; transition:gap .2s; }
.art-source a:hover{ gap:12px; }
.art-source svg{ width:16px; height:16px; }
.modal-foot{ display:flex; align-items:center; gap:12px; padding:16px 24px; border-top:1px solid var(--line); background:var(--card); }
.mf-btn{ display:inline-flex; align-items:center; gap:8px; padding:9px 14px; border:1px solid var(--line-strong); background:transparent;

.mf-btn:hover:not(:disabled){ border-color:var(--accent); color:var(--accent); }
.mf-btn:disabled{ opacity:.35; cursor:default; }
.mf-btn--r{ margin-left:auto; }
.mf-arrow{ display:grid; place-items:center; }
.mf-arrow svg{ width:16px; height:16px; }
.mf-prev{ transform:rotate(180deg); }
.mf-back{ background:var(--navy-900); color:#fff; border:none; padding:10px 20px; border-radius:8px; font-size:13.5px; font-weight:600;

.amjp[data-dark="true"] .mf-back{ background:var(--accent); color:#14100a; }
.mf-back:hover{ background:var(--navy-800); }

.footer-in{ display:grid; grid-template-columns:1.3fr 2fr; gap:60px; padding:64px 32px 50px; }
.footer-brand .brand-mark{ color:#fff; }
.footer-desc{ font-size:14px; line-height:1.65; color:#92a0b5; margin:22px 0 0; max-width:340px; }

.fcol-h{ font-family:var(--title-font); font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;

.fcol a:hover{ color:#fff; padding-left:5px; }
.footer-bar{ border-top:1px solid rgba(255,255,255,.08); }
.footer-bar-in{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; padding:20px 32px; font-size:12.5px; color:#7d8aa0; letter-spacing:.02em; }
.fb-credit{ color:#6c7890; }
.fb-credit strong{ color:#aab4c6; font-weight:600; }

/* ===== Responsive ===== */

  .amjp[data-theme="institucional"] .nav-mobile{ background:var(--navy-900); }
  .amjp[data-dark="true"] .nav-mobile{ background:#04101e; }
  .nm-group{ padding:0 32px; }
  .nm-top{ font-size:16px; font-weight:600; padding:12px 0 6px; color:#fff; }

/* ===== Archivo en cards (estilo Agenda Legal) ===== */
.ac-groups{ display:flex; flex-direction:column; gap:54px; }
.ac-group .year-div{ display:flex; align-items:center; gap:18px; margin-bottom:26px; }
.ac-group .yd-num{ font-family:var(--title-font); font-weight:700; font-size:34px; letter-spacing:-.01em; color:var(--ink); line-height:1; }

.ac-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:32px; grid-auto-rows:1fr; }
/* Cards del grid: mismo alto en todas las filas y título acotado a 2 líneas */
.ac-grid .ac-title{ display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.ac{ display:flex; flex-direction:column; background:var(--card); border:1px solid var(--line); border-radius:14px;

  box-shadow:0 28px 56px -28px rgba(12,26,48,.32); }
.ac-img{ position:relative; overflow:hidden; background:var(--line); }

.ac-badge{ position:absolute; top:0; left:0; z-index:2; padding:6px 14px;

.ac-body{ display:flex; flex-direction:column; gap:13px; padding:22px 24px 24px; flex:1; }

.ac-title{ font-family:var(--title-font); font-weight:600; font-size:21px; line-height:1.28; margin:0;
  letter-spacing:-.008em; color:var(--ink); transition:color .25s; text-wrap:pretty; }
.amjp[data-theme="moderno"] .ac-title{ font-weight:600; font-size:22px; }
.ac:hover .ac-title{ color:var(--accent); }
.ac-sum{ margin:0; font-size:14.5px; line-height:1.6; color:var(--ink-soft); text-wrap:pretty;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.ac-foot{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:auto; padding-top:6px; border-top:1px solid var(--line); }
.ac-date{ font-size:12.5px; color:var(--muted); letter-spacing:.02em; }
.ac-cta{ display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:var(--accent); letter-spacing:.01em; transition:gap .25s; }
.ac-cta svg{ width:15px; height:15px; }

/* La nota más reciente de cada año se destaca grande, el resto queda abajo en grilla */

.ac--lead .ac-body{ padding:28px 32px 30px; gap:15px; }
.ac--lead .ac-title{ font-size:clamp(24px, 2.8vw, 36px); line-height:1.15; }

/* ===== Divisoria editorial mínima ===== */

.sd-line{ flex:1; max-width:240px; height:1px;

.sd-line:first-child{ --sd-grad-dir:right; background:linear-gradient(to right, transparent, color-mix(in srgb, var(--accent) 55%, transparent)); }

/* ===== Banda divisoria institucional (compacta, contenido tipo marca de agua) ===== */

.ib-text{ display:flex; flex-direction:column; align-items:flex-start; gap:4px; min-width:0; }
.ib-mark{ font-family:var(--title-font); font-weight:700; font-size:24px; letter-spacing:.06em; color:#fff; line-height:1; }

@media (max-width:600px){

/* ===== Comisión Directiva ===== */

.cd-hero img{ width:100%; height:auto; border-radius:12px; display:block; box-shadow:0 24px 60px -30px rgba(12,26,48,.42); }
.cd-hero-cap{ margin:14px 0 0; font-size:13.5px; color:var(--muted); text-align:center; font-style:italic; }

.cd-table{ width:100%; border-collapse:collapse; font-size:14.5px; }

.cd-table th{ background:color-mix(in srgb, var(--accent) 8%, var(--card)); color:var(--ink); font-weight:600; letter-spacing:.02em; font-size:13px; text-transform:uppercase; border-right:1px solid var(--line); }
.cd-table td{ color:var(--ink-soft); border-right:1px solid var(--line); }

/* ===== Estatutos ===== */
.estatutos{ font-size:16px; line-height:1.75; color:var(--ink-soft); max-width:800px; margin:0 auto; }

.estatutos strong{ color:var(--ink); font-weight:600; }

/* Páginas legales (Política de Privacidad, etc.) */
.legal{ font-size:15.5px; line-height:1.72; color:var(--ink-soft); max-width:800px; margin:0 auto; }
.legal p{ margin:0 0 1.05em; text-wrap:pretty; }
.legal strong{ color:var(--ink); font-weight:600; }
.legal h2{ font-family:var(--title-font); font-size:19px; font-weight:600; color:var(--ink); margin:1.7em 0 .55em; }
.legal-updated{ font-size:13px; color:var(--muted); margin-bottom:1.6em; }

.legal-lbl{ font-weight:600; color:var(--ink); margin-right:4px; }
.legal-todo{ color:var(--accent); font-style:italic; font-size:.92em; }

/* ===== Grid de cards (expresidentes, álbumes) ===== */
.grid-cards{ display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:22px; }
.pres-card{ display:flex; flex-direction:column; background:var(--card); border:1px solid var(--line); border-radius:10px;
  overflow:hidden; cursor:pointer; transition:transform .25s, box-shadow .25s, border-color .25s; appearance:none; padding:0; color:inherit; text-align:left; }
.pres-card:hover{ transform:translateY(-3px); box-shadow:0 22px 44px -22px rgba(12,26,48,.3); border-color:var(--accent); }

.pres-info{ padding:14px 16px 18px; }

/* ===== Galería fotos en grid ===== */
.photo-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(180px, 1fr)); gap:10px; }
.photo-cell{ aspect-ratio:1/1; overflow:hidden; border-radius:6px; padding:0; border:0; background:var(--line); cursor:pointer; }
.photo-cell img{ width:100%; height:100%; object-fit:cover; display:block; transition:transform .35s; }
.photo-cell:hover img{ transform:scale(1.06); }

/* ===== Lightbox ===== */
.lbx{ position:fixed; inset:0; z-index:60; background:rgba(6,12,24,.92); display:grid; place-items:center; padding:32px; backdrop-filter:blur(8px); }
.lbx-x{ position:absolute; top:18px; right:18px; width:44px; height:44px; border-radius:50%; border:1px solid rgba(255,255,255,.15); background:rgba(0,0,0,.35); color:#fff; display:grid; place-items:center; }
.lbx-x svg{ width:20px; height:20px; }
.lbx-prev, .lbx-next{ position:absolute; top:50%; transform:translateY(-50%); width:48px; height:48px; border-radius:50%;
  border:1px solid rgba(255,255,255,.15); background:rgba(0,0,0,.35); color:#fff; display:grid; place-items:center; }
.lbx-prev{ left:24px; }
.lbx-prev svg{ transform:rotate(180deg); }
.lbx-next{ right:24px; }
.lbx-prev:disabled, .lbx-next:disabled{ opacity:.3; cursor:default; }
.lbx-fig{ margin:0; max-width:min(1100px, 92vw); max-height:84vh; display:flex; flex-direction:column; align-items:center; gap:14px; }
.lbx-fig img{ max-width:100%; max-height:74vh; border-radius:8px; box-shadow:0 30px 60px -20px rgba(0,0,0,.6); }

.lbx-count{ color:rgba(255,255,255,.55); font-size:12px; letter-spacing:.16em; text-transform:uppercase; }

/* ===== Beneficios ===== */
.benef-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:22px; }
.benef-card{ display:flex; flex-direction:column; gap:14px; padding:28px 28px 26px; background:var(--card);
  border:1px solid var(--line); border-radius:12px; transition:transform .25s, box-shadow .25s, border-color .25s; }
.benef-card:hover:not(.benef-card--off){ transform:translateY(-3px); border-color:var(--accent); box-shadow:0 22px 44px -22px rgba(12,26,48,.3); }

/* ===== Formularios ===== */
.form-card{ max-width:680px; margin:0 auto; background:var(--card); border:1px solid var(--line); border-radius:12px;
  padding:36px 38px 34px; box-shadow:0 24px 56px -36px rgba(12,26,48,.32); }

.list-cta{ display:flex; justify-content:flex-end; margin-bottom:22px; }

.aula-back{ display:inline-flex; align-items:center; gap:8px; background:none; border:0; padding:0 0 20px; font-size:13.5px;
  font-weight:600; color:var(--muted); cursor:pointer; transition:color .2s; }
.aula-back svg{ width:16px; height:16px; }
.aula-back:hover{ color:var(--accent); }
.aula-detail-banner{ display:flex; align-items:center; gap:20px; padding:32px clamp(24px,4vw,44px); border-radius:14px; margin-bottom:26px; }
.aula-detail-cap{ flex-shrink:0; width:52px; height:52px; color:#fff; opacity:.9; display:block; }
.aula-detail-cap svg{ width:100%; height:100%; }
.aula-detail-kicker{ display:block; font-size:11.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:rgba(255,255,255,.78); margin-bottom:6px; }
.aula-detail-title{ font-family:var(--title-font); font-weight:700; font-size:clamp(22px,2.6vw,32px); color:#fff; margin:0 0 8px; line-height:1.15; text-wrap:pretty; }
.aula-detail-date{ font-size:13px; color:rgba(255,255,255,.78); letter-spacing:.02em; }

.aula-tabs{ display:flex; gap:6px; border-bottom:1px solid var(--line); margin-bottom:28px; }
.aula-tab{ background:none; border:0; padding:12px 6px; margin-right:20px; font-size:14.5px; font-weight:600; color:var(--muted);
  position:relative; cursor:pointer; transition:color .2s; }
.aula-tab::after{ content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--accent); transform:scaleX(0); transition:transform .25s; }
.aula-tab.is-on{ color:var(--ink); }
.aula-tab.is-on::after{ transform:scaleX(1); }

.aula-stream{ display:flex; flex-direction:column; gap:16px; max-width:720px; }
.aula-post{ display:flex; gap:16px; padding:20px 22px; background:var(--card); border:1px solid var(--line); border-radius:12px; }
.aula-post-avatar{ flex-shrink:0; width:40px; height:40px; border-radius:50%; background:var(--navy-900); color:#fff;
  display:grid; place-items:center; font-size:11px; font-weight:700; letter-spacing:.02em; }
.amjp[data-dark="true"] .aula-post-avatar{ background:var(--accent); color:#14100a; }
.aula-post-head{ font-size:13.5px; color:var(--ink); margin-bottom:6px; }
.aula-post-text{ margin:0; font-size:14.5px; line-height:1.6; color:var(--ink-soft); text-wrap:pretty; }

.aula-details-panel{ max-width:640px; display:flex; flex-direction:column; gap:24px; }
.aula-dl{ display:flex; flex-direction:column; background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
.aula-dl-row{ display:flex; align-items:center; gap:16px; padding:15px 20px; border-bottom:1px solid var(--line); }
.aula-dl-row:last-child{ border-bottom:0; }
.aula-dl-lbl{ width:120px; flex-shrink:0; font-size:11.5px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
.aula-dl-val{ font-size:14px; color:var(--ink-soft); }
.aula-dl-val a{ color:var(--accent); font-weight:600; }
.aula-detail-img{ border-radius:12px; overflow:hidden; border:1px solid var(--line); }

@media (max-width:620px){
  .aula-detail-banner{ flex-direction:column; align-items:flex-start; gap:12px; }
  .aula-dl-row{ flex-direction:column; align-items:flex-start; gap:4px; }
  .aula-dl-lbl{ width:auto; }
}

/* ===== Aula Virtual: alumno (login, progreso, reproductor, playlist) ===== */
.aula-bar{ height:7px; border-radius:999px; background:color-mix(in srgb, var(--ink) 12%, transparent); overflow:hidden; }
.aula-bar--light{ background:rgba(255,255,255,.28); }
.aula-bar-fill{ height:100%; border-radius:999px; background:var(--accent); transition:width .35s ease; }
.aula-bar--light .aula-bar-fill{ background:#fff; }

/* Login */
.aula-login{ max-width:400px; margin:0 auto; background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:38px 34px 32px; text-align:center; box-shadow:0 30px 70px -40px rgba(12,26,48,.4); }
.aula-login-cap{ display:block; width:46px; height:46px; margin:0 auto 14px; color:var(--accent); }
.aula-login h2{ font-family:var(--title-font); font-size:22px; margin:0 0 6px; }
.aula-login > p{ margin:0 0 22px; font-size:13.5px; color:var(--muted); }
.aula-login label{ display:block; text-align:left; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin:0 0 6px; }
.aula-login input{ width:100%; padding:11px 14px; font-size:15px; border:1px solid var(--line-strong); border-radius:8px;
  outline:none; margin-bottom:16px; background:var(--paper); transition:border-color .2s, box-shadow .2s; }
.aula-login input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 16%, transparent); }
.aula-login button{ width:100%; padding:12px; background:var(--accent); color:#fff; border:0; border-radius:8px;
  font-weight:600; font-size:14.5px; margin-top:4px; transition:filter .2s; }
.aula-login button:hover:not(:disabled){ filter:brightness(1.08); }
.aula-login button:disabled{ opacity:.6; cursor:default; }
.aula-login-err{ background:#fbe9e8; border:1px solid #ec9b95; color:#8a2a23; padding:10px 14px; border-radius:8px;
  font-size:13px; margin-bottom:16px; text-align:left; }

/* Barra de usuario + resumen */
.aula-userbar{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  padding:16px 22px; background:var(--card); border:1px solid var(--line); border-radius:12px; margin-bottom:22px; }
.aula-userbar-name{ display:block; font-weight:700; font-size:15px; }
.aula-userbar-mail{ display:block; font-size:12.5px; color:var(--muted); margin-top:2px; }
.aula-logout{ padding:9px 16px; background:none; border:1px solid var(--line-strong); border-radius:8px; font-size:13px;
  font-weight:600; color:var(--ink-soft); transition:border-color .2s, color .2s; }
.aula-logout:hover{ border-color:var(--accent); color:var(--accent); }

.aula-summary{ display:flex; align-items:center; gap:28px; flex-wrap:wrap; padding:20px 24px; margin-bottom:30px;
  background:linear-gradient(135deg, color-mix(in srgb, var(--accent) 10%, var(--card)), var(--card));
  border:1px solid var(--line); border-radius:12px; }
.aula-summary-stat{ display:flex; flex-direction:column; }
.aula-summary-stat strong{ font-family:var(--title-font); font-size:24px; line-height:1; }
.aula-summary-stat span{ font-size:12px; color:var(--muted); margin-top:5px; }
.aula-summary-prog{ flex:1; min-width:180px; }
.aula-summary-prog .aula-bar{ margin-bottom:7px; }
.aula-summary-prog span{ font-size:12.5px; color:var(--ink-soft); font-weight:600; }

.aula-section-title{ font-family:var(--title-font); font-size:20px; margin:0 0 18px; }
.aula-card-prog{ margin:9px 0 0; font-size:12px; color:var(--muted); }

/* Barra de progreso del banner de curso */
.aula-detail-prog{ display:flex; align-items:center; gap:12px; margin-top:12px; flex-wrap:wrap; }
.aula-detail-prog .aula-bar{ width:200px; max-width:100%; }
.aula-detail-prog span{ font-size:12.5px; color:rgba(255,255,255,.9); font-weight:600; }

/* Layout curso: reproductor + playlist */
.aula-course{ display:grid; grid-template-columns:1fr 320px; gap:26px; align-items:start; }
.aula-course-main{ min-width:0; }
.aula-video{ width:100%; aspect-ratio:16/9; background:#000; border-radius:12px; display:block; }
.aula-player-empty, .aula-live{ width:100%; aspect-ratio:16/9; background:var(--card); border:1px solid var(--line);
  border-radius:12px; display:flex; align-items:center; justify-content:center; text-align:center; padding:24px;
  color:var(--muted); font-size:14px; gap:14px; }
.aula-live{ background:linear-gradient(135deg, color-mix(in srgb, #c0392b 12%, var(--card)), var(--card)); }
.aula-live-dot{ width:12px; height:12px; border-radius:50%; background:#e0392b; flex-shrink:0;
  box-shadow:0 0 0 0 rgba(224,57,43,.5); animation:aula-pulse 1.8s infinite; }
@keyframes aula-pulse{ 70%{ box-shadow:0 0 0 10px rgba(224,57,43,0); } 100%{ box-shadow:0 0 0 0 rgba(224,57,43,0); } }
.aula-live strong{ display:block; color:var(--ink); margin-bottom:4px; }
.aula-live p{ margin:0 0 6px; }
.aula-live a{ color:var(--accent); font-weight:600; }

.aula-lesson-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:18px; margin-top:20px; flex-wrap:wrap; }
.aula-lesson-info{ flex:1; min-width:0; }
.aula-lesson-title{ font-family:var(--title-font); font-size:21px; margin:0 0 6px; line-height:1.25; }
.aula-lesson-desc{ margin:0; font-size:14px; color:var(--ink-soft); line-height:1.6; }
.aula-complete{ flex-shrink:0; display:inline-flex; align-items:center; gap:7px; padding:10px 18px; border-radius:8px;
  border:1px solid var(--accent); background:var(--accent); color:#fff; font-weight:600; font-size:13.5px; transition:filter .2s; }
.aula-complete:hover{ filter:brightness(1.08); }
.aula-complete svg{ width:16px; height:16px; }
.aula-complete.is-done{ background:#3f6f78; border-color:#3f6f78; }

.aula-playlist{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px 16px; position:sticky; top:150px; }
.aula-pl-head{ font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:0 0 14px; padding:0 6px; }
.aula-pl-module{ margin-bottom:14px; }
.aula-pl-mtitle{ font-size:13.5px; font-weight:700; margin:0 0 6px; padding:0 6px; color:var(--ink); }
.aula-pl-empty{ font-size:12.5px; color:var(--muted); font-style:italic; padding:0 6px; margin:4px 0; }
.aula-pl-item{ display:flex; align-items:center; gap:10px; width:100%; text-align:left; padding:9px 8px; border:0; border-radius:8px;
  background:none; font-size:13.5px; color:var(--ink-soft); transition:background .15s; }
.aula-pl-item:hover{ background:var(--paper); }
.aula-pl-item.is-current{ background:color-mix(in srgb, var(--accent) 14%, transparent); color:var(--ink); font-weight:600; }
.aula-pl-ic{ flex-shrink:0; width:18px; text-align:center; font-size:11px; color:var(--accent); display:inline-flex; align-items:center; justify-content:center; }
.aula-pl-ic svg{ width:15px; height:15px; }
.aula-pl-item.is-done .aula-pl-ic{ color:#3f6f78; }
.aula-pl-title{ flex:1; min-width:0; line-height:1.35; }

@media (max-width:860px){
  .aula-course{ grid-template-columns:1fr; }
  .aula-playlist{ position:static; }
}

/* ===== Home — estilo portada de diario (hero + secciones temáticas por categoría) ===== */
.front-main{ padding-top:0; }
.home-section{ padding:var(--sec-gap) 0 0; }

/* Carrusel de la sede — foto chica al costado, texto al lado (como la portada de noticias) */
.hero-carousel{ padding:28px 0 0; }
.hc-stage{ position:relative; display:grid; grid-template-columns:1.2fr 1fr;
  min-height:clamp(240px, 30vw, 340px); background:var(--card); border:1px solid var(--line); border-radius:14px;
  overflow:hidden; box-shadow:0 24px 56px -32px rgba(12,26,48,.34); }
.hc-photo{ position:relative; overflow:hidden; background:var(--navy-900); }
.hc-photo .ph{ width:100%; height:100%; aspect-ratio:auto !important; }
.hc-text{ display:flex; flex-direction:column; justify-content:center; gap:10px; padding:clamp(22px,3vw,38px); min-width:0; }
.hc-kicker{ display:inline-flex; align-items:center; gap:10px; font-size:11.5px; letter-spacing:.28em; text-transform:uppercase;
  color:var(--accent); font-weight:600; }
.hc-kicker::before{ content:""; width:24px; height:1px; background:var(--accent); }
.hc-title{ font-family:var(--title-font); font-weight:700; font-size:clamp(20px,2.2vw,28px); margin:0; color:var(--ink); line-height:1.18; }
.hc-caption{ margin:0; font-size:14px; line-height:1.6; color:var(--ink-soft);
  display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; text-wrap:pretty; }
.hc-controls{ display:flex; align-items:center; gap:10px; margin-top:6px; }
.hc-ctrl{ width:34px; height:34px; border-radius:50%; border:1px solid var(--line); background:var(--paper); color:var(--ink-soft);
  display:grid; place-items:center; cursor:pointer; transition:background .2s, color .2s, border-color .2s; padding:0; flex-shrink:0; }
.hc-ctrl:hover{ background:var(--accent); color:#fff; border-color:var(--accent); }
.hc-ctrl svg{ width:14px; height:14px; }
.hc-count{ font-size:12px; color:var(--muted); letter-spacing:.02em; margin-left:auto; }

.hc-nav{ position:absolute; top:50%; transform:translateY(-50%); z-index:3; width:38px; height:38px; border-radius:50%;
  border:1px solid var(--line); background:color-mix(in srgb, var(--card) 88%, transparent); backdrop-filter:blur(8px);
  color:var(--ink); display:grid; place-items:center; cursor:pointer; box-shadow:0 8px 24px -10px rgba(12,26,48,.25);
  transition:background .2s, color .2s; padding:0; }
.hc-nav:hover{ background:var(--accent); color:#fff; }
.hc-nav svg{ width:16px; height:16px; }
.hc-prev{ left:12px; }
.hc-prev svg{ transform:rotate(180deg); }
.hc-next{ right:12px; }

@media (max-width:820px){
  .hc-stage{ grid-template-columns:1fr; min-height:0; }
  .hc-photo{ aspect-ratio:16 / 10; }
  .hc-photo .ph{ aspect-ratio:16 / 10 !important; }
}

.front-more{ display:inline-flex; align-items:center; gap:8px; margin:30px 0 44px; font-size:14.5px; font-weight:600; color:var(--accent); }
.front-more svg{ width:17px; height:17px; }
</style>
