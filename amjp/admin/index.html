<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panel de administración — AMJP</title>
<link rel="icon" type="image/png" href="../logo-amjp.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700&family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy-950:#091322; --navy-900:#0c1a30; --navy-800:#10243f; --navy-700:#163056;
  --gold:#b08a3c;
  --paper:#f5f3ee; --card:#ffffff; --ink:#1a212c; --ink-soft:#36404f; --muted:#646d7c;
  --line:#e6e3da; --line-strong:#d6d2c6;
  --title-font:'Spectral', Georgia, serif; --body-font:'Public Sans', system-ui, sans-serif;
  --danger:#a3372f;
}
*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; height:100%; }
body{ font-family:var(--body-font); background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased; }
a{ color:inherit; text-decoration:none; }
button{ font-family:inherit; cursor:pointer; }
input,textarea,select{ font-family:inherit; }

/* ===== Login ===== */
.login-screen{ min-height:100vh; display:grid; place-items:center; background:var(--navy-950); padding:20px; }
.login-card{ width:100%; max-width:380px; background:var(--card); border-radius:14px; padding:40px 36px 34px;
  box-shadow:0 40px 90px -30px rgba(0,0,0,.6); text-align:center; }
.login-logo{ width:56px; height:56px; margin:0 auto 18px; display:block; }
.login-card h1{ font-family:var(--title-font); font-size:22px; font-weight:700; margin:0 0 6px; }
.login-card p{ margin:0 0 26px; font-size:13.5px; color:var(--muted); }
.login-field{ text-align:left; margin-bottom:16px; }
.login-field label{ display:block; font-size:12.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; }
.login-field input{ width:100%; padding:11px 14px; font-size:15px; border:1px solid var(--line-strong); border-radius:7px;
  outline:none; transition:border-color .2s, box-shadow .2s; }
.login-field input:focus{ border-color:var(--gold); box-shadow:0 0 0 3px color-mix(in srgb, var(--gold) 18%, transparent); }
.login-err{ background:#fbe9e8; border:1px solid #ec9b95; color:#8a2a23; padding:10px 14px; border-radius:7px;
  font-size:13px; margin-bottom:16px; text-align:left; }
.login-btn{ width:100%; padding:12px; background:var(--navy-900); color:#fff; border:0; border-radius:8px;
  font-weight:600; font-size:14.5px; transition:background .2s; }
.login-btn:hover:not(:disabled){ background:var(--navy-700); }
.login-btn:disabled{ opacity:.6; cursor:default; }

/* ===== Shell ===== */
.admin-shell{ display:flex; min-height:100vh; }
.admin-sidebar{ width:230px; flex-shrink:0; background:var(--navy-950); color:#c7cedb; display:flex; flex-direction:column;
  padding:22px 0; }
.admin-brand{ display:flex; align-items:center; gap:10px; padding:0 20px 20px; border-bottom:1px solid rgba(255,255,255,.08); margin-bottom:14px; }
.admin-brand img{ width:32px; height:32px; }
.admin-brand span{ font-family:var(--title-font); font-weight:700; font-size:15px; color:#fff; line-height:1.25; }
.admin-nav{ flex:1; display:flex; flex-direction:column; gap:2px; padding:0 12px; }
.admin-nav-item{ display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:7px; font-size:14px;
  color:#aeb9cb; transition:background .15s, color .15s; border:0; background:none; width:100%; text-align:left; }
.admin-nav-item:hover:not(.is-disabled){ background:rgba(255,255,255,.06); color:#fff; }
.admin-nav-item.is-active{ background:var(--gold); color:#14100a; font-weight:600; }
.admin-nav-item.is-disabled{ opacity:.4; cursor:default; }
.admin-nav-tag{ margin-left:auto; font-size:9.5px; letter-spacing:.04em; text-transform:uppercase; opacity:.7; }
.admin-sidebar-foot{ padding:14px 20px 0; border-top:1px solid rgba(255,255,255,.08); margin-top:14px; }
.admin-user{ font-size:12.5px; color:#93a0b3; margin-bottom:10px; }
.admin-logout{ width:100%; padding:9px; background:transparent; border:1px solid rgba(255,255,255,.18); color:#c7cedb;
  border-radius:7px; font-size:13px; transition:background .2s, border-color .2s; }
.admin-logout:hover{ background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.32); }

.admin-main{ flex:1; min-width:0; padding:34px 40px 60px; }
.admin-head{ display:flex; align-items:center; justify-content:space-between; gap:20px; margin-bottom:26px; flex-wrap:wrap; }
.admin-head h1{ font-family:var(--title-font); font-size:26px; font-weight:700; margin:0; }
.admin-head p{ margin:4px 0 0; font-size:13.5px; color:var(--muted); }

.btn{ display:inline-flex; align-items:center; gap:8px; padding:10px 18px; border-radius:8px; font-size:14px; font-weight:600;
  border:1px solid var(--line-strong); background:var(--card); color:var(--ink); transition:all .2s; }
.btn:hover{ border-color:var(--gold); color:var(--gold); }
.btn-primary{ background:var(--navy-900); color:#fff; border-color:var(--navy-900); }
.btn-primary:hover{ background:var(--navy-700); color:#fff; border-color:var(--navy-700); }
.btn-danger{ color:var(--danger); border-color:#e3b3af; }
.btn-danger:hover{ background:#fbe9e8; border-color:var(--danger); color:var(--danger); }
.btn:disabled{ opacity:.5; cursor:default; }

.admin-search{ display:flex; align-items:center; gap:10px; padding:10px 16px; background:var(--card); border:1px solid var(--line);
  border-radius:999px; max-width:340px; margin-bottom:20px; }
.admin-search input{ flex:1; border:0; outline:0; background:transparent; font-size:14px; }

.admin-list{ background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
.admin-row{ display:grid; grid-template-columns:64px 1fr 130px 150px; gap:16px; align-items:center; padding:14px 20px;
  border-bottom:1px solid var(--line); }
.admin-row:last-child{ border-bottom:0; }
.admin-row-thumb{ width:56px; height:42px; border-radius:5px; overflow:hidden; background:var(--line); }
.admin-row-thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
.admin-row-title{ font-weight:600; font-size:14.5px; line-height:1.3; }
.admin-row-date{ font-size:13px; color:var(--muted); }
.admin-row-actions{ display:flex; gap:8px; justify-content:flex-end; }
.admin-row-actions button{ padding:7px 12px; font-size:12.5px; border-radius:6px; border:1px solid var(--line-strong); background:var(--card); }
.admin-row-actions button:hover{ border-color:var(--gold); color:var(--gold); }
.admin-empty{ padding:60px 20px; text-align:center; color:var(--muted); font-size:14.5px; }

.admin-form{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:30px 34px; max-width:720px; }
.admin-field{ margin-bottom:20px; }
.admin-field label{ display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin-bottom:7px; }
.admin-field input[type="text"], .admin-field input[type="date"], .admin-field textarea{
  width:100%; padding:11px 14px; font-size:14.5px; border:1px solid var(--line-strong); border-radius:7px; outline:none;
  transition:border-color .2s, box-shadow .2s; }
.admin-field input:focus, .admin-field textarea:focus{ border-color:var(--gold); box-shadow:0 0 0 3px color-mix(in srgb, var(--gold) 16%, transparent); }
.admin-field textarea{ resize:vertical; min-height:80px; line-height:1.5; }
.admin-row-2{ display:grid; grid-template-columns:1fr 1fr; gap:20px; }

.admin-img-preview{ width:220px; aspect-ratio:16/10; border-radius:8px; overflow:hidden; background:var(--paper);
  border:1px solid var(--line); display:grid; place-items:center; margin-bottom:12px; color:var(--muted); font-size:12.5px; }
.admin-img-preview img{ width:100%; height:100%; object-fit:cover; display:block; }

.para-list{ display:flex; flex-direction:column; gap:10px; }
.para-item{ display:flex; gap:8px; align-items:flex-start; }
.para-item textarea{ flex:1; }
.para-remove{ flex-shrink:0; width:34px; height:34px; border-radius:6px; border:1px solid var(--line-strong); background:var(--card);
  color:var(--danger); display:grid; place-items:center; font-size:16px; line-height:1; }
.para-remove:hover{ border-color:var(--danger); background:#fbe9e8; }
.para-add{ align-self:flex-start; margin-top:2px; font-size:13px; font-weight:600; color:var(--gold); background:none; border:0; padding:4px 0; }
.para-add:hover{ text-decoration:underline; }

.admin-form-actions{ display:flex; align-items:center; gap:12px; margin-top:28px; padding-top:20px; border-top:1px solid var(--line); }
.admin-form-actions .btn-danger{ margin-left:auto; }
.admin-err{ background:#fbe9e8; border:1px solid #ec9b95; color:#8a2a23; padding:11px 14px; border-radius:7px;
  font-size:13.5px; margin-bottom:18px; }
.admin-saved-tag{ font-size:13px; color:#3f6f78; font-weight:600; }

.admin-soon{ padding:80px 20px; text-align:center; color:var(--muted); }
.admin-soon h2{ font-family:var(--title-font); font-size:22px; color:var(--ink); margin:0 0 8px; }

.spinner-wrap{ min-height:100vh; display:grid; place-items:center; color:var(--muted); font-size:14px; }

/* ===== Aula Virtual (alumnos + contenido de cursos) ===== */
.admin-row--student{ grid-template-columns:1fr 170px 150px; }
.admin-row--course{ grid-template-columns:64px 1fr 180px; }
.admin-row-sub{ display:block; font-size:12.5px; color:var(--muted); font-weight:400; margin-top:3px; }
.tag-off{ display:inline-block; margin-left:8px; font-size:11px; font-weight:600; color:var(--danger); background:#fbe9e8; padding:1px 7px; border-radius:999px; }
.admin-check{ display:inline-flex; align-items:center; gap:8px; font-size:14px; color:var(--ink-soft); font-weight:500; padding-top:6px; }
.admin-check input{ width:16px; height:16px; }
.admin-hint{ font-size:12.5px; color:var(--muted); margin:14px 0 0; }

.admin-enroll{ margin-top:10px; padding-top:22px; border-top:1px solid var(--line); }
.admin-enroll h3{ font-family:var(--title-font); font-size:16px; margin:0 0 12px; }
.admin-enroll-empty{ font-size:13.5px; color:var(--muted); margin:0 0 12px; }
.enroll-chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
.enroll-chip{ display:inline-flex; align-items:center; gap:8px; padding:6px 6px 6px 13px; background:var(--paper); border:1px solid var(--line-strong);
  border-radius:999px; font-size:13px; }
.enroll-chip button{ width:20px; height:20px; border-radius:50%; border:0; background:rgba(0,0,0,.06); color:var(--danger); font-size:15px; line-height:1;
  display:grid; place-items:center; }
.enroll-chip button:hover{ background:#fbe9e8; }
.enroll-add{ display:flex; gap:10px; align-items:center; }
.enroll-add select{ flex:1; padding:10px 12px; font-size:14px; border:1px solid var(--line-strong); border-radius:7px; background:var(--card); outline:none; }
.enroll-add select:focus{ border-color:var(--gold); }

.admin-back{ background:none; border:0; color:var(--muted); font-size:13.5px; font-weight:600; padding:0; margin-bottom:16px; }
.admin-back:hover{ color:var(--gold); }

.mod-list{ display:flex; flex-direction:column; gap:16px; margin-bottom:22px; }
.mod-empty{ padding:34px 20px; text-align:center; color:var(--muted); font-size:14px; background:var(--card); border:1px dashed var(--line-strong); border-radius:12px; }
.mod-card{ background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px 20px; }
.mod-card-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
.mod-card-head h3{ font-family:var(--title-font); font-size:17px; margin:0; }
.mod-card-actions{ display:flex; gap:8px; }
.mod-card-actions button{ padding:6px 11px; font-size:12.5px; border-radius:6px; border:1px solid var(--line-strong); background:var(--card); color:var(--ink-soft); }
.mod-card-actions button:hover{ border-color:var(--gold); color:var(--gold); }

.les-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
.les-empty{ font-size:13px; color:var(--muted); margin:2px 0 4px; font-style:italic; }
.les-row{ display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--paper); border:1px solid var(--line); border-radius:8px; }
.les-ic{ font-size:14px; width:20px; text-align:center; flex-shrink:0; }
.les-main{ flex:1; min-width:0; }
.les-title{ font-size:14px; font-weight:600; }
.les-meta{ font-size:12px; color:var(--muted); margin-top:2px; }
.les-actions{ display:flex; gap:6px; }
.les-actions button{ padding:5px 10px; font-size:12px; border-radius:6px; border:1px solid var(--line-strong); background:var(--card); color:var(--ink-soft); }
.les-actions button:hover{ border-color:var(--gold); color:var(--gold); }
.les-add{ align-self:flex-start; font-size:13px; font-weight:600; color:var(--gold); background:none; border:1px dashed var(--line-strong); border-radius:7px; padding:8px 14px; }
.les-add:hover{ border-color:var(--gold); background:color-mix(in srgb, var(--gold) 8%, transparent); }

.les-form{ background:var(--paper); border:1px solid var(--line-strong); border-radius:10px; padding:18px 18px 16px; margin-top:6px; }
.les-form .admin-field{ margin-bottom:14px; }
.les-form input[type="text"], .les-form textarea{ width:100%; padding:10px 12px; font-size:14px; border:1px solid var(--line-strong); border-radius:7px; outline:none; background:var(--card); }
.les-form input:focus, .les-form textarea:focus{ border-color:var(--gold); }
.les-form textarea{ resize:vertical; min-height:60px; }
.les-form-actions{ display:flex; gap:10px; margin-top:8px; }
.les-video-ok{ display:flex; align-items:center; gap:12px; font-size:13.5px; color:#3f6f78; font-weight:600; }
.les-video-ok button{ font-size:12px; color:var(--danger); background:none; border:1px solid #e3b3af; border-radius:6px; padding:4px 10px; }
.les-video-ok button:hover{ background:#fbe9e8; }
.les-progress{ display:flex; align-items:center; gap:10px; }
.les-progress-bar{ height:8px; background:var(--gold); border-radius:999px; transition:width .2s; min-width:2px; }
.les-progress{ position:relative; background:var(--line); border-radius:999px; height:8px; overflow:visible; }
.les-progress span{ position:absolute; right:0; top:-22px; font-size:12px; color:var(--muted); font-weight:600; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="api.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
